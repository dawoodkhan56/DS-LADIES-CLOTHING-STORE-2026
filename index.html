<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS Ladies Clothing Store</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:white;
}

.navbar{
  backdrop-filter:blur(12px);
  background:rgba(0,0,0,0.6);
}

.nav-link:hover{color:gold;}

.hero{
  height:300vh;
  position:relative;
  overflow:hidden;
}

/* ✅ RESPONSIVE SLIDES FIX */
.slide{
  position:absolute;
  height:100%;
  background-size:cover;
  background-repeat:no-repeat;
  background-position:center;
  opacity:0;
  transition:1s;
  border:3px solid;
  border-image:linear-gradient(45deg,red,blue,green,gold) 1;
}

/* Desktop: 3 images */
@media(min-width:768px){
  .slide{
    width:33.33%;
  }
  .slide:nth-child(1){left:0;}
  .slide:nth-child(2){left:33.33%;}
  .slide:nth-child(3){left:66.66%;}
}

/* Mobile: 1 image full */
@media(max-width:767px){
  .slide{
    width:100%;
  }
  .slide{
    left:0 !important;
  }
}

.slide.active{opacity:1;}

.hero-border::before{
  content:'';
  position:absolute;
  inset:15px;
  border:3px solid;
  border-image:linear-gradient(45deg,red,blue,green,gold) 1;
  animation:borderMove 3s linear infinite;
}
@keyframes borderMove{
  0%{filter:hue-rotate(0deg)}
  100%{filter:hue-rotate(360deg)}
}

.glass{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  border-radius:20px;
}

.card{transition:0.3s;}
.card:hover{
  transform:scale(1.05);
  background:rgba(0,0,0,0.85);
  box-shadow:0 0 25px gold;
}

.btn{
  background:gold;
  color:black;
  padding:6px 10px;
  border-radius:8px;
}
.btn:hover{background:#b38f00;}
</style>
</head>

<body>

<nav class="navbar fixed w-full z-50 px-6 py-4">
  <div class="flex justify-between items-center">
    <h1 class="text-yellow-400 font-bold">DS Ladies</h1>
    <div class="md:hidden text-2xl cursor-pointer" onclick="toggleMenu()">☰</div>

    <div class="space-x-4 hidden md:block">
      <a href="#home" class="nav-link">Home</a>
      <a href="#shop" class="nav-link">Shop</a>
      <a href="#contact" class="nav-link">Contact</a>
      <span onclick="showCart()">Cart (<span id="cartCount">0</span>)</span>
    </div>
  </div>

  <div id="mobileMenu" class="hidden flex flex-col mt-4 space-y-2 md:hidden">
    <a href="#home" class="nav-link">Home</a>
    <a href="#shop" class="nav-link">Shop</a>
    <span onclick="showCart()">Cart (<span id="cartCount">0</span>)</span>
  </div>
</nav>

<!-- HERO -->
<section id="home" class="hero">

  <div class="slide active" style="background-image:url('images/product1.jpg')"></div>
  <div class="slide" style="background-image:url('images/product2.jpg')"></div>
  <div class="slide" style="background-image:url('images/product3.jpg')"></div>
  <div class="slide" style="background-image:url('images/product4.jpg')"></div>
  <div class="slide" style="background-image:url('images/product5.jpg')"></div>
  <div class="slide" style="background-image:url('images/product6.jpg')"></div>
  <div class="slide" style="background-image:url('images/product7.jpg')"></div>

  <div class="hero-border"></div>

  <div class="absolute inset-0 flex items-center justify-center">
    <div class="glass p-8 text-center">
      <h1 class="text-5xl text-yellow-400">DS Ladies Clothing</h1>
      <p>Luxury Collection 2026</p>
    </div>
  </div>
</section>

<section id="shop" class="p-8 grid grid-cols-1 md:grid-cols-3 gap-6"></section>

<section id="contact" class="text-center p-10">
  <h2 class="text-yellow-400 text-2xl">Contact</h2>
  <p>WhatsApp: 03183772475</p>
</section>

<footer class="text-center p-6 bg-black">
  2026 DAWOOD KHAN DS LADIES CLOTHING STORE
</footer>

<script>

function toggleMenu(){
  document.getElementById("mobileMenu").classList.toggle("hidden");
}

let slides = document.querySelectorAll('.slide');
let i = 0;

function showSlides(){
  slides.forEach(s => s.classList.remove('active'));

  let isMobile = window.innerWidth < 768;

  if(isMobile){
    // MOBILE: 1 image
    slides[i].classList.add('active');
    i = (i + 1) % slides.length;
  } else {
    // DESKTOP: 3 images
    slides[i].classList.add('active');
    slides[(i+1)%slides.length].classList.add('active');
    slides[(i+2)%slides.length].classList.add('active');

    i = (i + 3) % slides.length;
  }
}

setInterval(showSlides, 3000);
showSlides();

/* PRODUCTS (UNCHANGED) */
let products=[
{name:"Bridal Dress",price:10000,img:"images/product1.jpg"},
{name:"Luxury Dress",price:15000,img:"images/product2.jpg"},
{name:"Party Wear",price:12000,img:"images/product3.jpg"},
{name:"Casual Wear",price:8000,img:"images/product4.jpg"},
{name:"Wedding Dress",price:7500,img:"images/product5.jpg"},
{name:"Designer Dress",price:7000,img:"images/product6.jpg"},
{name:"Elegant Dress",price:6500,img:"images/product7.jpg"}
];

let cart=[];

function render(){
let html='';
products.forEach((p,i)=>{
html+=`
<div class='card glass p-4'>
<img src='${p.img}' class='w-full h-auto object-contain'>
<h2>${p.name}</h2>
<p class='text-yellow-400'>Rs ${p.price}</p>
<button class='btn' onclick='add(${i})'>Add to Cart</button>
<button class='btn' onclick='wa(${i})'>WhatsApp</button>
</div>`;
});
document.getElementById('shop').innerHTML=html;
}

function add(i){
  cart.push(products[i]);

  document.querySelectorAll('#cartCount').forEach(el=>{
    el.innerText = cart.length;
  });

  document.getElementById("mobileMenu").classList.add("hidden");
}

function showCart(){
let msg='Order:%0A';
cart.forEach(p=>msg+=p.name+' Rs '+p.price+'%0A');
window.open('https://wa.me/923183772475?text='+msg);
}

function wa(i){
let msg='I want to order: '+products[i].name+' Rs '+products[i].price;
window.open('https://wa.me/923183772475?text='+msg);
}

render();
</script>

</body>
</html>
